# Darwin, CA — Pb–Zn–Ag skarn and vein district (Inyo County)
# Carbonate-replacement skarn; excellent carbonate-band-ratio target
id: darwin
name: "Darwin, CA"
bbox_wgs84: [-117.80, 36.10, -117.40, 36.55]
layout: nested

classification:
  low_pct: 70
  high_pct: 90
  strong_score_min: 3

temporal:
  start: "2010-01-01"
  end: "2023-12-31"

structure_layers:
  - path: data/structures/darwin_faults.geojson
    type: faults
    buffer_m: 500
